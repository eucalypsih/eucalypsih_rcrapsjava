name: Build and Release Multiple Apps

on:
  push:
    tags:
      - 'v*' # Berjalan otomatis saat Anda push tag seperti v1.0, v2.1.3, dll.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '21' # Sesuaikan dengan versi Java yang Anda gunakan
        distribution: 'temurin'

    # --- PROSES BUILD DIREKTORI 1: frasa ---
    - name: Build frasa App
      working-directory: ./frasa
      run: |
        chmod +x gradlew
        ./gradlew shadowJar
        # Mengubah nama hasil build agar tidak bentrok saat diunggah
        mv app/build/libs/app-all.jar app/build/libs/frasa.jar

    # --- PROSES BUILD DIREKTORI 2: frasa_gson ---
    - name: Build frasa_gson App
      working-directory: ./frasa_gson
      run: |
        chmod +x gradlew
        ./gradlew shadowJar
        # Mengubah nama hasil build agar tidak bentrok saat diunggah
        mv app/build/libs/app-all.jar app/build/libs/frasa_gson.jar

    # --- PROSES UNGGAH KE GITHUB RELEASES ---
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          frasa/app/build/libs/frasa.jar
          frasa_gson/app/build/libs/frasa_gson.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
