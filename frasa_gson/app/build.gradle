plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    alias(libs.plugins.shadow) // id 'com.gradleup.shadow'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // This dependency is used by the application.
    implementation libs.guava

    // Ambil langsung dari internet, tanpa perlu file JAR lokal
//    implementation 'com.google.code.gson:gson:2.11.0'

    // Gunakan fungsi ini agar jalurnya dikunci secara absolut ke folder app/libs:
//    implementation files(layout.projectDirectory.file("libs/gson-2.11.0.jar"))

    // Ganti fileTree kemarin dengan baris spesifik ini:
//    implementation files('libs/gson-2.11.0.jar')

    implementation libs.gson
    // Tambahkan baris ini untuk membaca file JAR lokal:
//    implementation fileTree(dir: 'libs', include: ['*.jar'])

}

testing {
    suites {
        // Configure the built-in test suite
        test {
            // Use JUnit4 test framework
            useJUnit('4.13.2')
        }
    }
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'org.example.App'
}

run {
    standardInput = System.in
}
